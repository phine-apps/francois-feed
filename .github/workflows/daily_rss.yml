name: Daily RSS Generator
on:
  schedule:
    - cron: "30 * * * *" # Every hour at minute 30
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    env:
      TZ: Asia/Tokyo
      SCHEDULE_HOUR_JST: ${{ vars.SCHEDULE_HOUR_JST || '07' }}
    steps:
      - name: Check Schedule
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT_HOUR=$(date +%H)
          TARGET_HOUR="${{ env.SCHEDULE_HOUR_JST }}"
          if [ "$CURRENT_HOUR" = "$TARGET_HOUR" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Current hour ($CURRENT_HOUR) does not match target hour ($TARGET_HOUR). Skipping matching."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RSS_CONFIG_PROMPT: ${{ secrets.RSS_CONFIG_PROMPT }}
        run: uv run main.py -g ${{ secrets.GIST_ID }}
