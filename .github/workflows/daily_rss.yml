name: Daily RSS Generator
on:
  schedule:
    - cron: "30 * * * *" # Every hour at minute 30
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v6
      - name: Check Schedule
        if: github.event_name == 'schedule'
        run: |
          CURRENT_HOUR=$(date +%H)
          TARGET_HOUR="${{ vars.SCHEDULE_HOUR_JST }}"
          if [ "$CURRENT_HOUR" != "$TARGET_HOUR" ]; then
            echo "Current hour ($CURRENT_HOUR) does not match target hour ($TARGET_HOUR). Skipping."
            exit 0
          fi
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RSS_CONFIG_PROMPT: ${{ secrets.RSS_CONFIG_PROMPT }}
        run: uv run main.py -g ${{ secrets.GIST_ID }}
