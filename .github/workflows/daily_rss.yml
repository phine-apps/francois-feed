name: Daily RSS Generator
on:
  schedule:
    - cron: "15,35,55 * * * *" # Every 20 minutes, shifted to avoid peak times
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    env:
      TZ: Asia/Tokyo
      SCHEDULE_HOUR_JST: ${{ vars.SCHEDULE_HOUR_JST || '07' }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Check Schedule
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          TODAY=$(date +%F)
          GIST_UPDATED_AT=$(gh api gists/${{ secrets.GIST_ID }} --jq '.updated_at')
          GIST_DATE=$(date -d "$GIST_UPDATED_AT" +%F)
          CURRENT_HOUR=$(date +%H)
          TARGET_HOUR="${{ env.SCHEDULE_HOUR_JST }}"

          echo "Today (JST): $TODAY"
          echo "Gist Last Updated (JST): $GIST_DATE"
          echo "Current Hour (JST): $CURRENT_HOUR"
          echo "Target Hour (JST): $TARGET_HOUR"

          # If it's already target hour (or later) AND not yet updated today
          if [ "$CURRENT_HOUR" -ge "$TARGET_HOUR" ] && [ "$GIST_DATE" != "$TODAY" ]; then
            echo "Time to run and not yet updated today. Proceeding."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Skipping (Too early or already updated today)."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RSS_CONFIG_PROMPT: ${{ secrets.RSS_CONFIG_PROMPT }}
        run: uv run main.py -g ${{ secrets.GIST_ID }}
